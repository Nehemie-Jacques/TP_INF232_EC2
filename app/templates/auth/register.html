<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — INF232 EC2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-bar-chart-line-fill"></i></div>
      <h1>Créer un compte</h1>
      <p>INF232 EC2 — Analyse de Données</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 mb-3" style="font-size:13px">{{ message }}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Nom d'utilisateur</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Minimum 3 caractères" required minlength="3">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="votre@email.com" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Minimum 6 caractères" required minlength="6">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirmer le mot de passe</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="confirm_password" class="form-control" placeholder="Répétez le mot de passe" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
        <i class="bi bi-person-plus me-2"></i>Créer mon compte
      </button>
    </form>

    <hr class="my-4">
    <p class="text-center mb-0" style="font-size:13px; color:#6b7280">
      Déjà un compte ?
      <a href="{{ url_for('auth.login') }}" class="fw-600 text-decoration-none">Se connecter</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
